server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve React app - handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy FastAPI routes to backend
    location ~ ^/(api|analyze|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for large audio file uploads
        client_max_body_size 50M;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # WebSocket support for /api/assess/stream
    location /api/assess/stream {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}