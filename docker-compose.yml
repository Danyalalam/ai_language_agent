services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: language_agent_backend
    ports:
      - "8000:8000"
    env_file:
      - .env                      # your Azure keys live here
    volumes:
      - ./backend_errors.log:/app/backend_errors.log   # persist logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8000/api
    container_name: language_agent_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: language_agent_network